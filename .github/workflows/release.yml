name: CI / Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.6'

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXE_LINKER_FLAGS="-static"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Strip binary
        run: strip build/criper-mcp

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: criper-mcp-linux-x86_64
          path: build/criper-mcp
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download binary from build job
        uses: actions/download-artifact@v4
        with:
          name: criper-mcp-linux-x86_64

      - name: Rename binary
        run: mv criper-mcp criper-mcp-${{ github.ref_name }}-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: criper-mcp-${{ github.ref_name }}-linux-x86_64
          generate_release_notes: true
